services:
  # ─── SYNΞ Bot ──────────────────────────────────────────────────
  bot:
    build: .
    container_name: syne-bot
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - syne-network

  # ─── PostgreSQL Database ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: syne-postgres
    environment:
      POSTGRES_DB: syne_bot
      POSTGRES_USER: syne
      POSTGRES_PASSWORD: ${DB_PASSWORD:-syne_secure_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syne -d syne_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - syne-network

  # ─── Redis Cache ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: syne-redis
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - syne-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  syne-network:
    driver: bridge
